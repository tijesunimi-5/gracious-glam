          ></div>
          <div

            <div class="flex flex-col gap-1">

        </div>

      <div class="flex flex-col gap-3 px-4 py-4">

        <button

          <span class="material-symbols-outlined mr-2 text-lg">download</span>
          <span class="truncate">Download Receipt</span>
        </button>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        // 1. Get data from localStorage
        const service =
          localStorage.getItem("gg_booking_service") || "Bridal Glam Session";
        const dateStr =
          localStorage.getItem("gg_booking_date") || "October 14, 2024";
        const timeStr = localStorage.getItem("gg_booking_time") || "10:00 AM";

        // 2. Update the Text on Screen
        document.getElementById("service-name").innerText = service;
        document.getElementById("appointment-time").innerText =
          `${dateStr} at ${timeStr}`;

        // 3. Google Calendar Logic
        document
          .getElementById("google-cal-btn")
          .addEventListener("click", () => {
            // Format date for Google (YYYYMMDDTHHMMSSZ)
            // We assume a 1-hour session for the calendar block
            const fullDate = new Date(`${dateStr} ${timeStr}`);
            const endDate = new Date(fullDate.getTime() + 60 * 60 * 1000); // +1 hour

            const formatCalDate = (date) =>
              date.toISOString().replace(/-|:|\.\d+/g, "");

            const start = formatCalDate(fullDate);
            const end = formatCalDate(endDate);

            const title = encodeURIComponent(`Makeup Session: ${service}`);
            const details = encodeURIComponent(
              `Luxury makeup appointment with Gracious Glam.`,
            );
            const location = encodeURIComponent(
              `GG Luxury Studio, Beverly Hills`,
            );

            const googleUrl = `https://www.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${start}/${end}&details=${details}&location=${location}&sf=true&output=xml`;

            window.open(googleUrl, "_blank");
          });
      });
    </script>
