<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,200..800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#e8305e",
              "background-light": "#f8f6f6",
              "background-dark": "#211114",
            },
            fontFamily: { display: ["Newsreader", "serif"] },
          },
        },
      };
    </script>
    <style>
      body {
        min-height: 100dvh;
      }
      /* Removes scrollbars and adds breathing room */
      .calendly-inline-widget {
        min-width: 320px;
        height: 750px;
        overflow: hidden;
      }
    </style>
  </head>
  <body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased"
  >
    <div
      class="relative flex min-h-screen w-full flex-col max-w-md mx-auto shadow-2xl bg-white dark:bg-background-dark"
    >
      <header
        class="flex items-center p-4 border-b border-primary/10 sticky top-0 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md z-20"
      >
        <div
          onclick="window.history.back()"
          class="flex size-10 items-center justify-center rounded-full hover:bg-primary/5 cursor-pointer"
        >
          <span class="material-symbols-outlined">arrow_back</span>
        </div>
        <h2 class="text-xl font-bold flex-1 text-center italic">
          Gracious Glam
        </h2>
        <div class="size-10"></div>
      </header>

      <main class="flex-1 pb-32">
        <section class="p-6 text-center">
          <h1 class="text-3xl font-bold mb-2 italic">Book Your Session</h1>
          <p class="text-slate-500 text-sm">
            Luxury artistry for your most precious moments.
          </p>
        </section>

        <section class="px-2">
          <div
            class="calendly-inline-widget"
            data-url="https://calendly.com/ogundejigraceayomide/gracious-glam-session?hide_landing_page_details=1&hide_gdpr_banner=1&primary_color=e8305e"
          ></div>
          <script
            type="text/javascript"
            src="https://assets.calendly.com/assets/external/widget.js"
            async
          ></script>
        </section>
      </main>

      <nav
        class="fixed bottom-0 left-0 right-0 z-50 flex border-t border-primary/10 bg-white/90 dark:bg-background-dark/90 backdrop-blur-lg px-6 pb-6 pt-3 max-w-md mx-auto"
      >
        <a
          class="flex flex-1 flex-col items-center justify-center gap-1"
          href="index.html"
        >
          <span class="material-symbols-outlined">home</span>
          <p class="text-[10px] font-bold uppercase tracking-widest">Home</p>
        </a>
        <a
          class="flex flex-1 flex-col items-center justify-center gap-1"
          href="service.html"
        >
          <span class="material-symbols-outlined">palette</span>
          <p class="text-[10px] font-medium uppercase tracking-widest">
            Services
          </p>
        </a>
        <a
          class="flex flex-1 flex-col items-center justify-center gap-1"
          href="testimonials.html"
        >
          <span class="material-symbols-outlined">photo_library</span>
          <p class="text-[10px] font-medium uppercase tracking-widest">
            Gallery
          </p>
        </a>
        <a
          class="flex flex-1 flex-col items-center justify-center gap-1 text-primary"
          href="contact.html"
        >
          <span class="material-symbols-outlined fill-1">calendar_month</span>
          <p class="text-[10px] font-medium uppercase tracking-widest">Book</p>
        </a>
      </nav>
    </div>
  </body>
</html>
